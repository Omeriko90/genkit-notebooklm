apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: genkit-notebooklm
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/genkit-notebooklm
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: EXTRACTOR_URL
              value: http://localhost:8081
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
