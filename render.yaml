services:
  - type: web
    name: genkit-notebooklm
    runtime: docker
    plan: standard
    healthCheckPath: /health
    preDeployCommand: cd /app/synthesis && npx prisma migrate deploy
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: EXTRACTOR_URL
        value: http://localhost:8081
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: BROWSERLESS_API_KEY
        sync: false
